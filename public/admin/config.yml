backend:
  name: github
  repo: gabrieltemtsen/larial-landing
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - file: "content/settings.json"
        label: "Settings"
        name: "settings"
        fields:
          - { label: "Business Name", name: "name", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Address", name: "address", widget: "string" }
          - { label: "Working Hours", name: "hours", widget: "string" }
          - { label: "WhatsApp (E.164)", name: "whatsappE164", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }

  - name: "services"
    label: "Services"
    files:
      - file: "content/services.json"
        label: "Services"
        name: "services"
        fields:
          - label: "Services"
            name: "items"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Starting From (NGN)", name: "startingFromNgn", widget: "number", required: false }

  - name: "careers"
    label: "Careers"
    files:
      - file: "content/jobs.json"
        label: "Open Roles"
        name: "jobs"
        fields:
          - label: "Jobs"
            name: "items"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Location", name: "location", widget: "string" }
              - { label: "Type", name: "type", widget: "string" }
              - { label: "Summary", name: "summary", widget: "text" }
              - { label: "Responsibilities", name: "responsibilities", widget: "list" }
              - { label: "Requirements", name: "requirements", widget: "list" }

# NOTE: To enable login you'll need to configure GitHub OAuth for Decap CMS.
# We'll wire this once the repo is created and the domain is known.
